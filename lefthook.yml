# Git hooks gérés par lefthook (installés via le script "prepare" de package.json).
# But : vérifier le code AVANT chaque commit/push, automatiquement.

pre-commit:
  parallel: true
  commands:
    # Formate les fichiers indexés, puis ré-indexe les corrections.
    format:
      glob: '*.{ts,tsx,js,mjs,json,css,md,yml,yaml}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    # Lint uniquement les fichiers TS/TSX indexés.
    lint:
      glob: '*.{ts,tsx}'
      run: pnpm eslint {staged_files}

pre-push:
  commands:
    # Vérification de types complète avant de pousser.
    typecheck:
      run: pnpm typecheck
