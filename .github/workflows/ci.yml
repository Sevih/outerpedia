name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sevih/outerpedia # doit être en minuscules pour GHCR

jobs:
  # Vérifications de qualité (sur PR et push).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Sans `version:`, l'action lit le champ "packageManager" de package.json.
      # C'est voulu : la version de pnpm se déclare à UN seul endroit, sinon le
      # CI et le poste de dev dérivent en silence (on a tourné en 11 en local
      # pendant que le CI et l'image de prod restaient en 10).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # .nvmrc = seule source de vérité de la version Node (comme
          # packageManager pour pnpm juste au-dessus).
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # lefthook ne formate que les fichiers stagés et se saute (--no-verify) :
      # sans ce contrôle, rien côté serveur ne garantit le formatage.
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      # La suite Vitest (~3 s) : sans elle, les 278 tests ne gardent RIEN —
      # lefthook ne joue que format/lint/typecheck, et personne d'autre ne les
      # lance. C'est ici la seule barrière automatique.
      - run: pnpm test
      # Le build (~7 min) ne tourne QUE sur les PR. Sur push main, le job
      # `docker` refait exactement ce `next build` dans l'image — le jouer aussi
      # ici, c'est payer deux fois le meme build en serie. Sur une PR en
      # revanche `docker` ne tourne pas : ce build est alors la seule preuve que
      # la compilation passe avant merge, donc on le garde.
      - run: pnpm build
        if: github.event_name == 'pull_request'

  # Build de l'image Docker + publication sur GHCR (uniquement sur push main).
  docker:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Le build genere ~4500 pages statiques et la sortie standalone de Next
      # DUPLIQUE node_modules dans l'image : le disque ~14 Go du runner sature
      # au COPY final (`no space left on device`). On retire les toolchains
      # preinstalles dont ce build ne se sert pas (Android ~9 Go, .NET ~2 Go,
      # GHC, CodeQL, Swift) -> ~25 Go regagnes. Pas d'action tierce : un rm
      # transparent, verifie par le `df -h` avant/apres dans les logs.
      - name: Liberer de l'espace disque sur le runner
        run: |
          echo "Avant :" && df -h / | tail -1
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/powershell \
                      /usr/share/swift
          echo "Apres :" && df -h / | tail -1

      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          # `min` (et pas `max`) : `max` exportait AUSSI la couche `builder`
          # (node_modules + .next de ~4500 pages + tout le source) a chaque
          # build — ~4 min d'export pour une couche qui ne re-sert jamais,
          # puisque le source change a chaque commit. `min` n'exporte que les
          # couches de l'image finale. On perd le cache du `pnpm install`
          # (~40 s au build suivant), on gagne ~4 min d'export : large positif.
          cache-to: type=gha,mode=min

  # Déploiement automatique sur le VPS (après build de l'image).
  deploy:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH sur le VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # SANS `set -e`, LE DÉPLOIEMENT MENT : l'action enchaîne toutes les
            # lignes sans s'arrêter sur une erreur et ne renvoie que le code de
            # la DERNIÈRE (`prune -f`, qui réussit toujours). Un `compose up` en
            # échec serait masqué et la CI afficherait vert sans rien déployer.
            # (`script_stop:` n'existe PAS dans appleboy/ssh-action@v1 — il est
            # ignoré avec un simple warning. Vérifié : il ne protégeait rien.)
            set -e
            # sops vit dans ~/.local/bin (installé sans sudo). Un shell non
            # interactif ne lit pas ~/.profile : sans cette ligne, sops est
            # introuvable et le déchiffrement échoue.
            export PATH="$HOME/.local/bin:$PATH"
            cd ~/sevih-tool
            # Régénère stack/.env depuis le coffre chiffré. Le compose exige des
            # variables (`${VAR:?}`) ; si l'infra en ajoute une et que .env n'est
            # pas régénéré, le déploiement du CODE casse à cause d'un changement
            # d'INFRA. On resynchronise donc à chaque fois. (`git pull` reste
            # manuel : l'infra ne s'auto-déploie pas, cf. sevih-tool/docs/git-sync.md)
            ./scripts/secrets-decrypt.sh
            cd stack
            docker compose pull
            docker compose up -d
            docker image prune -f
