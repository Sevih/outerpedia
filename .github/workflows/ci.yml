name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sevih/outerpedia # doit être en minuscules pour GHCR

jobs:
  # Vérifications de qualité (sur PR et push).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  # Build de l'image Docker + publication sur GHCR (uniquement sur push main).
  docker:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Déploiement automatique sur le VPS (après build de l'image).
  deploy:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH sur le VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # SANS CECI, LE DÉPLOIEMENT MENT : par défaut l'action enchaîne toutes
          # les lignes sans s'arrêter sur une erreur, et ne renvoie que le code
          # de la DERNIÈRE. Un `compose up` en échec serait masqué par le
          # `prune` qui suit, et la CI afficherait vert sans avoir rien déployé.
          script_stop: true
          script: |
            # sops vit dans ~/.local/bin (installé sans sudo). Un shell non
            # interactif ne lit pas ~/.profile : sans cette ligne, sops est
            # introuvable et le déchiffrement échoue.
            export PATH="$HOME/.local/bin:$PATH"
            cd ~/sevih-tool
            # Régénère stack/.env depuis le coffre chiffré. Le compose exige des
            # variables (`${VAR:?}`) ; si l'infra en ajoute une et que .env n'est
            # pas régénéré, le déploiement du CODE casse à cause d'un changement
            # d'INFRA. On resynchronise donc à chaque fois. (`git pull` reste
            # manuel : l'infra ne s'auto-déploie pas, cf. sevih-tool/docs/git-sync.md)
            ./scripts/secrets-decrypt.sh
            cd stack
            docker compose pull
            docker compose up -d
            docker image prune -f
